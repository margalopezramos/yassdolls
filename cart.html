<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Yass.Dolls</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kite+One&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          // SUSTITUYE CON TU PUBLIC KEY DE EMAILJS (Sección Account)
          emailjs.init("2fvz0e5vtG7gAfDha");
       })();
    </script>

    <style>
        .cart-page-body { background-color: #fce4ec; padding: 40px 20px; font-family: 'Kite One', sans-serif; }
        .cart-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .cart-title { color: #880e4f; font-family: 'Pacifico', cursive; font-size: 35px; text-align: center; margin-bottom: 30px; }
        
        .cart-flex { display: flex; gap: 30px; flex-wrap: wrap; }
        .items-section { flex: 1.2; min-width: 300px; }
        .details-section { flex: 1.5; min-width: 300px; background: #fff5f8; padding: 20px; border-radius: 15px; border: 1px solid #f8bbd0; }

        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f8bbd0; }
        .remove-btn { color: #ff5252; border: none; background: none; cursor: pointer; font-weight: bold; }

        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; flex: 1; }
        .form-group label { display: block; color: #880e4f; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; padding: 10px; border: 1px solid #f8bbd0; border-radius: 10px; box-sizing: border-box; font-family: inherit;
        }

        .summary-box { background: white; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #f8bbd0; }
        .summary-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 16px; }
        .total-row { font-size: 22px; font-weight: bold; color: #880e4f; border-top: 2px solid #880e4f; padding-top: 10px; margin-top: 10px; }

        .btn-pay { 
            display: block; width: 100%; background: #880e4f; color: white !important; text-align: center; 
            padding: 15px; border-radius: 30px; text-decoration: none; margin-top: 20px; font-weight: bold; font-size: 18px; cursor: pointer; border: none;
        }

        #payment-options { display: none; margin-top: 20px; text-align: center; }
        .order-id-badge { background: #fce4ec; color: #ad1457; padding: 5px 15px; border-radius: 15px; font-weight: bold; margin-bottom: 15px; display: inline-block; }
        
        .paypal-button, .revolut-button {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px; border-radius: 30px; text-decoration: none; font-weight: bold; margin-bottom: 10px; transition: transform 0.2s;
        }
        .paypal-button { background-color: #003087; color: white !important; }
        .revolut-button { background-color: #ffffff; color: black !important; border: 1px solid #000; }
        .paypal-button:hover, .revolut-button:hover { transform: scale(1.02); }

        .back-link { display: block; text-align: center; margin-top: 15px; color: #ad1457; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body class="cart-page-body">

    <div class="cart-container">
        <h1 class="cart-title">Your Yass Cart</h1>

        <div class="cart-flex">
            <div class="items-section">
                <h3>Your Selection 🎀</h3>
                <div id="cart-list"></div>
                <a href="index.html" class="back-link">← Add more dolls</a>
            </div>

            <div class="details-section">
                <h3>Shipping Details 📍</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="user-name" placeholder="E.g. Ariana" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="user-lastname" placeholder="E.g. Grande" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="user-email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label>Destination Country</label>
                    <select id="shipping-country" onchange="calculateTotal()">
                        <option value="0">Select your country...</option>
                        <option value="7">Spain (7€)</option>
                        <option value="14">EU (14€)</option>
                        <option value="18">UK (18€)</option>
                        <option value="25">USA (25€)</option>
                        <option value="30">Rest of the World (30€)</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label>ZIP Code</label>
                        <input type="text" id="user-zip" placeholder="12345" required>
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label>Shipping Address</label>
                        <input type="text" id="user-address" placeholder="Street, number, floor..." required>
                    </div>
                </div>

                <div class="summary-box">
                    <div class="summary-row"><span>Dolls Subtotal:</span> <span id="subtotal-price">0€</span></div>
                    <div class="summary-row"><span>Shipping:</span> <span id="shipping-price">0€</span></div>
                    <div class="summary-row total-row"><span>Total:</span> <span id="total-price">0€</span></div>
                </div>

                <button id="main-checkout-btn" class="btn-pay" onclick="handleCheckout()">Proceed to Payment</button>

                <div id="payment-options">
                    <div class="order-id-badge">Order ID: <span id="display-order-id"></span></div>
                    <p style="color: #880e4f; font-weight: bold; margin-bottom: 10px; font-size: 14px;">Summary sent! Choose your payment method:</p>
                    
                    <a id="paypal-link" href="#" target="_blank" class="paypal-button">
                        <img src="https://www.paypalobjects.com/webstatic/icon/pp258.png" alt="PayPal" style="height:20px;">
                        Pay with PayPal
                    </a>

                    <a id="revolut-link" href="#" target="_blank" class="revolut-button">
                        <img src="images/Revolut.png" alt="Revolut" style="height:20px;">
                        Pay with Card
                    </a>
                    
                    <p style="font-size: 11px; color: #880e4f; margin-top: 10px;">
                        *Important: Check your email. Once payment is verified, you will receive a second confirmation!
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('yassCart')) || [];
        window.currentTotal = 0;

        function renderCart() {
            const list = document.getElementById('cart-list');
            if (cart.length === 0) {
                list.innerHTML = "<p>Your cart is empty! 💖</p>";
                calculateTotal();
                return;
            }

            list.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span>${item.price}€ <button class="remove-btn" onclick="removeItem(${index})">✕</button></span>
                </div>
            `).join('');

            calculateTotal();
        }

        function calculateTotal() {
            const countrySelect = document.getElementById('shipping-country');
            let subtotal = cart.reduce((sum, item) => sum + item.price, 0);
            let shippingCost = 0;
            let basePrice = parseFloat(countrySelect.value);

            if (cart.length > 0 && basePrice > 0) {
                shippingCost = basePrice + ((cart.length - 1) * 4);
            }

            window.currentTotal = subtotal + shippingCost;
            document.getElementById('subtotal-price').innerText = subtotal + "€";
            document.getElementById('shipping-price').innerText = shippingCost + "€";
            document.getElementById('total-price').innerText = window.currentTotal + "€";
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('yassCart', JSON.stringify(cart));
            renderCart();
            document.getElementById('main-checkout-btn').style.display = 'block';
            document.getElementById('payment-options').style.display = 'none';
        }

        function handleCheckout() {
            const fName = document.getElementById('user-name').value.trim();
            const lName = document.getElementById('user-lastname').value.trim();
            const email = document.getElementById('user-email').value.trim();
            const zip = document.getElementById('user-zip').value.trim();
            const address = document.getElementById('user-address').value.trim();
            const countrySelect = document.getElementById('shipping-country');
            const countryName = countrySelect.options[countrySelect.selectedIndex].text;

            if (!fName || !lName || !email || !zip || !address || countrySelect.value == "0") {
                alert("Please fill in all the information to proceed! 💖");
                return;
            }

            if (cart.length === 0) {
                alert("Add some dolls first! 🛍️");
                return;
            }

            // GENERAR ORDER ID
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            const namePart = fName.substring(0, 3).toUpperCase();
            const zipPart = zip.substring(0, 2);
            const orderId = `YASS-${namePart}${zipPart}-${randomNum}`;

            // ENVIAR EMAIL AUTOMÁTICO
            const dollList = cart.map(item => `- ${item.name} (${item.price}€)`).join(', ');
            
            emailjs.send("service_4tj2erx", "template_fs1e76s", {
                order_id: orderId,
                user_name: fName + " " + lName,
                user_email: email,
                user_address: address + " (ZIP: " + zip + ")",
                user_country: countryName,
                order_details: dollList,
                total_price: window.currentTotal + "€"
            }).then(() => {
                console.log("Confirmation sent!");
            });

            // Mostrar ID y links de pago
            document.getElementById('display-order-id').innerText = orderId;
            document.getElementById('paypal-link').href = `https://www.paypal.com/paypalme/crispe30/${window.currentTotal}`;
            document.getElementById('revolut-link').href = `https://revolut.me/margar9jva`;

            document.getElementById('main-checkout-btn').style.display = 'none';
            document.getElementById('payment-options').style.display = 'block';
            
            alert("Order " + orderId + " registered! Check your email and proceed to payment. 💖");
        }

        window.onload = renderCart;
    </script>
</body>
</html>
